# GitHub Pages / Jekyll — https://pages.github.com/
# Built from README via scripts/build-github-pages.sh (CI + optional local runs)

title: "Awesome Agent-Native Services (2026) | MCP & Agent Infrastructure"
# Used only in <title> (short for SEO). On-page <h1> still uses page title from index.md.
seo_html_title: "Top Agent-Native Services 2026 | MCP & AI Infra"
description: "Explore top agent-native services for AI agents in 2026: MCP tools, browser automation, memory, code sandboxes, observability, and runtime infrastructure."
url: "https://haoruilee.github.io"
baseurl: "/awesome-agent-native-services"
lang: en-US
author: haoruilee

# Open Graph / Twitter — used by jekyll-seo-tag
logo: "/assets/images/social-preview.png"
social:
  name: Awesome Agent-Native Services
  links:
    - "https://github.com/haoruilee/awesome-agent-native-services"

theme: jekyll-theme-cayman
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# jekyll-seo-tag default image when pages do not override
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/social-preview.png

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
